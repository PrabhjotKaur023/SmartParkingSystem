<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f4f7fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card{
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .title h2{
            font-weight:700;
            color:#0d6efd;
        }

        .form-control{
            padding:12px;
            border-radius:10px;
        }

        .btn-register{
            width:100%;
            padding:12px;
            border-radius:10px;
            font-size:18px;
            font-weight:600;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        ul{
            font-size:14px;
            color:#6c757d;
        }

    </style>
</head>

<body>

<div class="register-card">

    <div class="title">
        <h2>🚗 Smart Parking System</h2>
        <p>Create your account</p>
    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            {{ form.email }}
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password1 }}
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            {{ form.password2 }}
        </div>

        <button type="submit"
                class="btn btn-success btn-register">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="{% url 'login' %}">
            Login
        </a>
    </div>

</div>

</body>
</html>
